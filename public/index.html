<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taipei Station Photo Navigation</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <a class="skip-link" href="#controlsPanel" data-i18n="skipToControls">Skip to controls</a>
  <header>
    <h1 data-i18n="appTitle">Taipei Station Photo Navigation</h1>
    <div class="top-actions">
      <select id="langSelect" aria-label="Language">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      <button id="voiceToggleBtn" class="voice-toggle" type="button" aria-pressed="true">
        <span class="voice-icon" aria-hidden="true"></span>
        <span id="voiceToggleText" data-i18n="voiceOn">Voice on</span>
      </button>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="sr-only" id="audioHelp" role="status" aria-live="polite" data-i18n="audioHelp">
        Voice guidance is ready. Choose a destination, take a wall-map photo, then follow the spoken route.
      </div>
      <div class="map-shell">
        <div id="tileLayer" class="tile-layer" aria-hidden="true"></div>
        <canvas id="mapCanvas" width="1100" height="720" tabindex="0" role="img" aria-label="Taipei Station underground navigation map"></canvas>
        <div class="badge" id="mapBadge" role="status" aria-live="polite" data-i18n="waiting">Waiting for location</div>
        <div class="map-attribution">&copy; OpenStreetMap &copy; CARTO</div>
        <div class="map-tools">
          <button id="zoomInBtn" type="button" aria-label="Zoom in">+</button>
          <button id="zoomOutBtn" type="button" aria-label="Zoom out">-</button>
          <button id="centerBtn" type="button" data-i18n="centerCurrent">Center</button>
        </div>
      </div>
      <div class="hint" id="routeHint" role="status" aria-live="polite" data-i18n="photoHelp">Take a wall-map photo to update the floor map, coordinates, AP/IP, and route.</div>
    </section>

    <aside class="panel" id="controlsPanel">
      <div class="field">
        <label for="destinationSearch" data-i18n="destinationSearch">Search destination</label>
        <input id="destinationSearch" list="destinationSuggestions" autocomplete="off" data-i18n-placeholder="destinationSearchPlaceholder">
        <datalist id="destinationSuggestions"></datalist>
      </div>
      <div class="field">
        <label for="destPlace" data-i18n="destination">Destination</label>
        <select id="destPlace"></select>
      </div>
      <div class="field">
        <label for="photoInput" data-i18n="photoMap">Photo of wall map</label>
        <input id="photoInput" type="file" accept="image/*" capture="environment">
      </div>
      <div class="actions">
        <button id="locateBtn" class="primary" type="button" data-i18n="locateByPhoto">Locate by Photo</button>
      </div>
      <div class="status" id="locationBox" role="status" aria-live="polite">-</div>
      <div class="status" id="statusBox" role="status" aria-live="polite">Server...</div>
      <div class="sr-only" id="screenReaderSummary" aria-live="assertive"></div>
    </aside>
  </main>

  <script src="/user.js"></script>
</body>
</html>
